<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL 缩短工具 | URL Shortener</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🔗 URL 缩短工具</h1>
                <p class="subtitle">快速、简单、免费的 URL 缩短服务</p>
            </div>

            <div class="input-section">
                <input 
                    type="text" 
                    id="urlInput" 
                    placeholder="请输入要缩短的长 URL（例如：https://example.com/very/long/url）"
                    class="url-input"
                >
                <button id="shortenBtn" class="btn btn-primary">缩短 URL</button>
            </div>

            <div id="resultSection" class="result-section hidden">
                <div class="result-item">
                    <label>原始 URL：</label>
                    <div class="url-display">
                        <span id="originalUrl"></span>
                    </div>
                </div>

                <div class="result-item">
                    <label>缩短后的 URL：</label>
                    <div class="url-display">
                        <span id="shortenedUrl"></span>
                        <button id="copyBtn" class="btn btn-copy">📋 复制</button>
                    </div>
                </div>

                <div class="result-item">
                    <label>短链接码：</label>
                    <div class="url-display">
                        <span id="shortCode"></span>
                        <button id="copyCodeBtn" class="btn btn-copy">📋 复制</button>
                    </div>
                </div>
            </div>

            <div class="history-section">
                <h2>📋 缩短历史</h2>
                <div id="historyList" class="history-list">
                    <p class="empty-message">还没有缩短过 URL，开始使用吧！</p>
                </div>
                <button id="clearHistoryBtn" class="btn btn-secondary hidden">清空历史</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
